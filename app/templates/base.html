<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard | Company Finder{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-body-tertiary">

    <!-- Loading Overlay Spinner -->
    <div id="loading-overlay" class="d-none">
        <div class="text-center text-white">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 fw-semibold">Processing Lead Scan...</p>
        </div>
    </div>

    <!-- Sidebar Layout -->
    <div id="sidebar" class="bg-body-secondary d-flex flex-column flex-shrink-0">
        <div class="p-3 d-flex align-items-center justify-content-between border-bottom">
            <a href="/" class="d-flex align-items-center text-decoration-none text-body">
                <span class="fs-4 fw-bold text-primary"><i class="bi bi-building"></i> Finder</span>
            </a>
            <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebar-toggle-btn">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <ul class="nav nav-pills flex-column mb-auto py-3">
            <li class="nav-item">
                <a href="/" class="sidebar-link {% if request.endpoint == 'main.dashboard' %}active{% endif %}">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
            </li>
            <li>
                <a href="{{ url_for('project.list_projects') }}" class="sidebar-link {% if request.blueprint == 'project' %}active{% endif %}">
                    <i class="bi bi-folder-fill me-2"></i> Projects
                </a>
            </li>
            <li>
                <a href="{{ url_for('search.search_history') }}" class="sidebar-link {% if request.blueprint == 'search' %}active{% endif %}">
                    <i class="bi bi-search me-2"></i> Lead Searches
                </a>
            </li>
            <li>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-briefcase-fill me-2"></i> Businesses
                </a>
            </li>
            <li>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-people-fill me-2"></i> B2B Outreach
                </a>
            </li>
        </ul>

        <hr class="mx-3 my-1">
        <div class="p-3">
            <div class="d-flex align-items-center justify-content-between">
                <span class="text-muted small"><i class="bi bi-person-circle"></i> Demo User</span>
                <button id="theme-toggle" class="btn btn-sm btn-link p-0 text-decoration-none" title="Toggle Light/Dark Theme">
                    <i class="bi bi-moon-stars-fill text-secondary"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Content Area Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">

        <!-- Top Navigation Header -->
        <header class="topbar navbar bg-body border-bottom">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <button class="btn btn-outline-secondary btn-sm me-3 d-md-none" id="sidebar-mobile-btn">
                        <i class="bi bi-list"></i>
                    </button>

                    <!-- Search Bar Header -->
                    <form class="d-none d-sm-flex" role="search">
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-search"></i></span>
                            <input class="form-control bg-light border-start-0 ps-0" type="search" placeholder="Quick search leads..." aria-label="Search">
                        </div>
                    </form>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <div class="dropdown">
                        <button class="btn btn-sm btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-plus-lg"></i> Quick Action
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#"><i class="bi bi-folder-plus me-2"></i>New Project</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-search me-2"></i>New Search</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-grow-1 p-4 overflow-auto">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap Toast Container (Placeholder for Toast notifications) -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="app-toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <i id="toast-icon" class="bi bi-info-circle-fill me-2 text-primary"></i>
                <strong id="toast-title" class="me-auto">Notification</strong>
                <small class="text-muted">just now</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div id="toast-body" class="toast-body">
                Welcome to Company Finder!
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle (with Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Application JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
